[functions]
  directory = "netlify/functions"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────
# Applied to every response.
#
# CSP notes:
# - script-src 'self' (no 'unsafe-inline', no 'unsafe-eval') is the line
#   that actually defends against XSS-token-theft. If a directive needs
#   loosening, find an alternative before adding 'unsafe-inline' to scripts.
# - style-src keeps 'unsafe-inline' because Tailwind/React style behaviour
#   plus odd third-party libs make it impractical to remove pre-launch.
# - connect-src covers Supabase REST + Realtime WebSocket. When Stripe lands,
#   add https://js.stripe.com to script-src and https://api.stripe.com to
#   connect-src and https://js.stripe.com to frame-src for Stripe Elements.
[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(self), microphone=(), payment=(self), usb=(), interest-cohort=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.supabase.co; font-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; worker-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
